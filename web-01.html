<!DOCTYPE html>
<html lang="es">
<head> 
    <title>Introducción a la programación</title>
</head> 
     <body> 
       <h2>Ingrese un dato</h2>
         <input type="text" id="miEntrada" placeholder="Escribe algo...">
            <button onclick="mostrar()">Enviar</button>
            <p id="resultado"></p>

            <script>
                // Función para mostrar el dato ingresado
                function mostrar() {
                    // Obtener el valor del campo de entrada
                    var entrada = document.getElementById("miEntrada");
                    // Obtener el párrafo donde se mostrará el resultado
                    var parrafo = document.getElementById("resultado");
                    // Actualizar el contenido del párrafo con el dato ingresado
                    parrafo.textContent = "El dato ingresado es: " + entrada.value;
                }          
          </script>
     </body>      
</html>

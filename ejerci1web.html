<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"    ">
    <title>Document</title>
</head>
<body>
    <div id="miAlerta" class="alert alert-success d-none" role="alert">
  ¡Excelente! Has activado la alerta correctamente.
</div>
<button id="activateAlert" class="btn btn-primary" onclick="mostrarAlerta()">Activar Alerta</button>
    
<script>
   function mostrarAlerta() {
   
    const alerta =document.getElementById("miAlerta");
     alerta.classList.remove("d-none");


    }
    


</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ejercicio 3 - Progress Bar</title>
</head>
<body class="p-5">
    <h3>Barra de Progreso</h3>

    <div class="progress mb-3" style="height: 30px;">
        <div id="miBarra" class="progress-bar progress-bar-striped" role="progressbar" 
             style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
    </div>

    <button class="btn btn-success" onclick="aumentarProgreso()">Aumentar +25%</button>

    <script>
        let avance = 0;
        function aumentarProgreso() {
            const barra = document.getElementById('miBarra');
            if (avance < 100) {
                avance += 25;
                barra.style.width = avance + '%';
                barra.innerText = avance + '%';
                barra.setAttribute('aria-valuenow', avance);
            }
        }
    </script>
</body>
</html>
